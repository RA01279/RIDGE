name: RIDGE SCOUT — Automated Sweep & Dossier

on:
  schedule:
    # Mon, Wed, Fri at 8:00 AM Eastern (13:00 UTC)
    - cron: '0 13 * * 1,3,5'
  workflow_dispatch:
    # Also allow manual trigger from GitHub Actions tab
    inputs:
      submarket_override:
        description: 'Override submarket (optional, leave blank to use config.json)'
        required: false
        default: ''

permissions:
  contents: write   # needed to commit reports back to repo
  pages: write      # needed to deploy to GitHub Pages
  id-token: write

jobs:
  scout-sweep:
    name: Run SCOUT Sweep + Dossier
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Node.js ───────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Run the sweep script ─────────────────────────────────────────
      - name: Run RIDGE SCOUT Sweep + Dossier
        env:
          ANTHROPIC_API_KEY: ${{ secrets.RIDGEAPI }}
        run: |
          echo "🔍 Starting RIDGE SCOUT run at $(date)"
          node scripts/run-sweep.js
          echo "✅ SCOUT run complete"

      # ── 4. Commit reports back to repo ──────────────────────────────────
      - name: Commit reports to repository
        run: |
          git config user.name  "RIDGE SCOUT Bot"
          git config user.email "scout-bot@ridge.re"
          git add reports/
          if git diff --staged --quiet; then
            echo "No new reports to commit"
          else
            git commit -m "SCOUT report — $(date +'%Y-%m-%d') Mon/Wed/Fri sweep"
            git push
            echo "✅ Reports committed and pushed"
          fi

      # ── 5. Deploy GitHub Pages ───────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
